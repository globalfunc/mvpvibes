services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: true
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
    volumes:
      - sqlite_data:/var/www/html/database
      - storage_data:/var/www/html/storage

volumes:
  sqlite_data:
  storage_data:
